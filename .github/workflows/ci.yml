name: CI - Security Scanning

on:
  workflow_call:

permissions:
  contents: read
  security-events: write

jobs:
  # ============================================================
  # GATE 1: SECRET SCANNING (Gitleaks)
  # ============================================================
  gitleaks:
    name: Secret Scan - Gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================================
  # GATE 2: LINT - Python Flake8
  # ============================================================
  lint:
    name: Lint - Flake8
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Run Flake8
        run: |
          pip install flake8
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics || true

  # ============================================================
  # GATE 3: SAST - Semgrep
  # ============================================================
  sast:
    name: SAST - Semgrep
    runs-on: ubuntu-latest
    needs: [gitleaks, lint]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Semgrep SAST Scan
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/python
            p/owasp-top-ten
            p/secrets

  # ============================================================
  # GATE 4: SCA - Pip-audit
  # ============================================================
  sca:
    name: SCA - Pip-audit
    runs-on: ubuntu-latest
    needs: [gitleaks, lint]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Run Pip-audit
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt || true
