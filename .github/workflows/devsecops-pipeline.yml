name: AI-Powered Financial Tracker DevSecOps Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Security Scan (Semgrep)
      run: |
        python3 -m pip install semgrep
        semgrep --config auto .

    - name: Build Docker Image
      run: |
        docker build -t financial-tracker:${{ github.sha }} .

    - name: Container Scan (Trivy)
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'financial-tracker:${{ github.sha }}'
        format: 'table'
        exit-code: '1'
        ignore-unfixed: true
        vuln-type: 'os,library'
        severity: 'CRITICAL,HIGH'

    - name: Push to DockerHub
      if: success()
      run: |
        echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
        docker tag financial-tracker:${{ github.sha }} ${{ secrets.DOCKERHUB_USERNAME }}/financial-tracker:latest
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/financial-tracker:latest
