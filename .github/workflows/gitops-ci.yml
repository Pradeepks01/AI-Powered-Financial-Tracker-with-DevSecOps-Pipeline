name: GitOps CI - Build & Push to DockerHub

on:
  push:
    branches: [feat/gitops-eks]
    paths:
      - 'src/**'
      - 'Dockerfile'
      - 'requirements.txt'
  workflow_dispatch:

permissions:
  contents: write

env:
  DOCKERHUB_REPO: pradeeepks/ai-financial-tracker-eks

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKERHUB_REPO }}:latest
            ${{ env.DOCKERHUB_REPO }}:${{ steps.tag.outputs.sha_short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update Kubernetes deployment manifest
        run: |
          sed -i "s|image: ${{ env.DOCKERHUB_REPO }}:.*|image: ${{ env.DOCKERHUB_REPO }}:${{ steps.tag.outputs.sha_short }}|" k8s/financial-tracker-deployment.yml

      - name: Commit and push updated manifest
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add k8s/financial-tracker-deployment.yml
          if ! git diff --staged --quiet; then
            git commit -m "ci: update financial-tracker image to ${{ steps.tag.outputs.sha_short }} [skip ci]"
            git push origin ${{ github.ref_name }}
          else
            echo "No changes to commit"
          fi