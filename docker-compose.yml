services:
  mysql:
    image: mysql:8.0
    container_name: financial-tracker-mysql
    environment:
      MYSQL_ROOT_PASSWORD: Test@123
      MYSQL_DATABASE: financial_db
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ft-net

  ollama:
    image: ollama/ollama
    container_name: financial-tracker-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    dns:
      - 8.8.8.8
    networks:
      - ft-net

  app:
    build: .
    container_name: financial-tracker-app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: "mysql+pymysql://root:Test%40123@mysql:3306/financial_db"
      OLLAMA_URL: "http://ollama:11434"
    depends_on:
      mysql:
        condition: service_healthy
      ollama:
        condition: service_started
    networks:
      - ft-net

volumes:
  mysql-data:
  ollama-data:

networks:
  ft-net:
    driver: bridge
