<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Financial Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8f9fa;
            color: #1a1a1a;
            min-height: 100vh;
            display: flex;
            items-center: center;
            justify-content: center;
        }
        .login-card {
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .btn-orange {
            background-color: #ff6b35;
            color: white;
            font-weight: 600;
        }
        .btn-orange:hover {
            background-color: #fa5a1f;
        }
    </style>
</head>
<body class="p-4">
    <div class="login-card max-w-md w-full p-10">
        <div class="text-center mb-8">
            <div class="w-12 h-12 bg-orange-500 rounded-full flex items-center justify-center text-white font-bold italic mx-auto mb-4">F</div>
            <h1 class="text-2xl font-bold">Create Account</h1>
            <p class="text-sm text-gray-500 mt-1">Start your smart financial journey</p>
        </div>

        <form onsubmit="handleRegister(event)" class="space-y-4">
            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase mb-1">Username</label>
                <input id="username" type="text" required class="w-full border border-gray-200 rounded-lg px-4 py-3 focus:outline-none focus:border-orange-500 transition">
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase mb-1">Password</label>
                <input id="password" type="password" required class="w-full border border-gray-200 rounded-lg px-4 py-3 focus:outline-none focus:border-orange-500 transition">
            </div>
            
            <button type="submit" class="w-full btn-orange py-3 rounded-lg mt-4 transition transform active:scale-95">
                Register
            </button>
        </form>

        <div class="mt-8 text-center text-sm text-gray-500">
            Already have an account? 
            <a href="/login" class="text-orange-600 font-bold hover:underline">Sign In</a>
        </div>
    </div>

    <script>
        async function handleRegister(e) {
            e.preventDefault();
            const payload = {
                username: document.getElementById('username').value,
                password: document.getElementById('password').value
            };

            const res = await fetch('/api/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            
            if (res.ok) {
                alert('Account created successfully!');
                window.location.href = '/login';
            } else {
                const data = await res.json();
                alert(data.detail || 'Registration failed');
            }
        }
    </script>
</body>
</html>
